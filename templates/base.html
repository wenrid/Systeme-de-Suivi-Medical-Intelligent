<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Système Médical{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f5f5f5; 
        }
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 15px 20px; 
            margin-bottom: 20px;
        }
        .role-badge { 
            background: #3498db; 
            padding: 5px 10px; 
            border-radius: 3px; 
            font-size: 12px; 
        }
        .dashboard { 
            background: white; 
            padding: 20px; 
            border-radius: 5px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            margin: 0 20px;
        }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 20px 0; 
        }
        .stat-card { 
            background: #ecf0f1; 
            padding: 15px; 
            border-radius: 5px; 
            text-align: center; 
        }
        .stat-number { 
            font-size: 24px; 
            font-weight: bold; 
            color: #2c3e50; 
        }
        .logout { 
            float: right; 
            color: #ecf0f1; 
            text-decoration: none; 
        }
        .logout:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="display: inline-block; margin: 0;">Système de Suivi Médical</h1>
        <a href="{% url 'core:logout' %}" class="logout">Déconnexion</a>
        <br>
        <span class="role-badge">{{ user.get_role_display }}</span>
    </div>
    
    <div class="dashboard">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
