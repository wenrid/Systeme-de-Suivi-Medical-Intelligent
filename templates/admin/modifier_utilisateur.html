{% extends 'base.html' %}

{% block title %}Modifier Utilisateur{% endblock %}

{% block content %}
<style>
    .edit-header {
        background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        color: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
    }
    
    .form-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        max-width: 800px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #2c3e50;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #3498db;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }
    
    .btn-submit {
        background: #f39c12;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
    }
    
    .btn-submit:hover {
        background: #e67e22;
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .checkbox-group input[type="checkbox"] {
        width: auto;
    }
</style>

<div class="edit-header">
    <h1>✏️ Modifier l'Utilisateur</h1>
    <p>{{ user_obj.get_full_name }} (@{{ user_obj.username }})</p>
</div>

<div class="form-card">
    <form method="post" action="">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" name="first_name" value="{{ user_obj.first_name }}" required>
            </div>
            
            <div class="form-group">
                <label>Nom</label>
                <input type="text" name="last_name" value="{{ user_obj.last_name }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user_obj.email }}">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Rôle</label>
                <select name="role" id="role" required onchange="toggleSpecialite()">
                    <option value="medecin" {% if user_obj.role == 'medecin' %}selected{% endif %}>👨‍⚕️ Médecin</option>
                    <option value="analyste" {% if user_obj.role == 'analyste' %}selected{% endif %}>📊 Analyste</option>
                    <option value="admin" {% if user_obj.role == 'admin' %}selected{% endif %}>👨‍💼 Administrateur</option>
                </select>
            </div>
            
            <div class="form-group" id="specialite-group" {% if user_obj.role != 'medecin' %}style="display: none;"{% endif %}>
                <label>Spécialité</label>
                <input type="text" name="specialite" id="specialite" value="{{ user_obj.specialite }}">
            </div>
        </div>
        
        <div class="form-group">
            <label>Nouveau mot de passe (laisser vide pour ne pas changer)</label>
            <input type="password" name="new_password" placeholder="Nouveau mot de passe">
        </div>
        
        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" name="is_active" id="is_active" {% if user_obj.is_active %}checked{% endif %}>
                <label for="is_active" style="margin: 0;">Compte actif</label>
            </div>
        </div>
        
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn-submit">
                ✅ Enregistrer les modifications
            </button>
            <a href="{% url 'admin_views:gestion_utilisateurs' %}" class="btn-submit" style="background: #95a5a6; text-decoration: none; text-align: center; line-height: 1.5;">
                ❌ Annuler
            </a>
        </div>
    </form>
</div>

<script>
function toggleSpecialite() {
    const role = document.getElementById('role').value;
    const specialiteGroup = document.getElementById('specialite-group');
    const specialiteInput = document.getElementById('specialite');
    
    if (role === 'medecin') {
        specialiteGroup.style.display = 'block';
    } else {
        specialiteGroup.style.display = 'none';
        specialiteInput.value = '';
    }
}
</script>

{% endblock %}
