{% extends 'base.html' %}

{% block title %}Créer un Utilisateur{% endblock %}

{% block content %}
<style>
    .create-header {
        background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        color: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
    }
    
    .form-card {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        max-width: 800px;
        margin: 0 auto;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #2c3e50;
    }
    
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }
    
    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #3498db;
    }
    
    .form-row {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }
    
    .btn-submit {
        background: #27ae60;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        width: 100%;
    }
    
    .btn-submit:hover {
        background: #229954;
    }
    
    .required {
        color: #e74c3c;
    }
</style>

<div class="create-header">
    <h1>➕ Créer un Nouvel Utilisateur</h1>
    <p>Ajouter un médecin, analyste ou administrateur</p>
</div>

<div class="form-card">
    <form method="post" action="">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label>Nom d'utilisateur <span class="required">*</span></label>
                <input type="text" name="username" required placeholder="Ex: dr_dupont">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="exemple@email.com">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Prénom <span class="required">*</span></label>
                <input type="text" name="first_name" required placeholder="Jean">
            </div>
            
            <div class="form-group">
                <label>Nom <span class="required">*</span></label>
                <input type="text" name="last_name" required placeholder="Dupont">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Rôle <span class="required">*</span></label>
                <select name="role" id="role" required onchange="toggleSpecialite()">
                    <option value="">-- Sélectionner un rôle --</option>
                    <option value="medecin">👨‍⚕️ Médecin</option>
                    <option value="analyste">📊 Analyste</option>
                    <option value="admin">👨‍💼 Administrateur</option>
                </select>
            </div>
            
            <div class="form-group" id="specialite-group" style="display: none;">
                <label>Spécialité</label>
                <input type="text" name="specialite" id="specialite" placeholder="Ex: Cardiologue, Pédiatre...">
            </div>
        </div>
        
        <div class="form-group">
            <label>Mot de passe <span class="required">*</span></label>
            <input type="password" name="password" required placeholder="Minimum 8 caractères">
        </div>
        
        <div style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn-submit">
                ✅ Créer l'utilisateur
            </button>
            <a href="{% url 'admin_views:gestion_utilisateurs' %}" class="btn-submit" style="background: #95a5a6; text-decoration: none; text-align: center; line-height: 1.5;">
                ❌ Annuler
            </a>
        </div>
    </form>
</div>

<script>
function toggleSpecialite() {
    const role = document.getElementById('role').value;
    const specialiteGroup = document.getElementById('specialite-group');
    const specialiteInput = document.getElementById('specialite');
    
    if (role === 'medecin') {
        specialiteGroup.style.display = 'block';
        specialiteInput.required = true;
    } else {
        specialiteGroup.style.display = 'none';
        specialiteInput.required = false;
        specialiteInput.value = '';
    }
}
</script>

{% endblock %}
